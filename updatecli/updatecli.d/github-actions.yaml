name: "Bump GitHub Actions versions"

scms:
  default:
    kind: github
    spec:
      user: "updatecli-bot"
      owner: "gounthar"
      repository: "xcp-ng-scaleway-elastic-metal"
      branch: "main"
      token: '{{ requiredEnv "UPDATECLI_GITHUB_TOKEN" }}'

sources:
  checkout:
    name: "Get latest actions/checkout version"
    kind: githubrelease
    spec:
      owner: "actions"
      repository: "checkout"
      token: '{{ requiredEnv "UPDATECLI_GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

  updatecli-action:
    name: "Get latest updatecli-action version"
    kind: githubrelease
    spec:
      owner: "updatecli"
      repository: "updatecli-action"
      token: '{{ requiredEnv "UPDATECLI_GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

  action-yamllint:
    name: "Get latest action-yamllint version"
    kind: githubrelease
    spec:
      owner: "ibiqlik"
      repository: "action-yamllint"
      token: '{{ requiredEnv "UPDATECLI_GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

  action-actionlint:
    name: "Get latest raven-actions/actionlint version"
    kind: githubrelease
    spec:
      owner: "raven-actions"
      repository: "actionlint"
      token: '{{ requiredEnv "UPDATECLI_GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

  action-shellcheck:
    name: "Get latest action-shellcheck version"
    kind: githubrelease
    spec:
      owner: "ludeeus"
      repository: "action-shellcheck"
      token: '{{ requiredEnv "UPDATECLI_GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

targets:
  checkout:
    name: "Update actions/checkout in updatecli workflow"
    kind: file
    sourceid: checkout
    scmid: default
    spec:
      file: .github/workflows/updatecli.yaml
      matchpattern: 'uses: actions/checkout@(.*)'
      replacepattern: 'uses: actions/checkout@{{ source "checkout" }}'

  updatecli-action:
    name: "Update updatecli-action in updatecli workflow"
    kind: file
    sourceid: updatecli-action
    scmid: default
    spec:
      file: .github/workflows/updatecli.yaml
      matchpattern: 'uses: updatecli/updatecli-action@(.*)'
      replacepattern: 'uses: updatecli/updatecli-action@{{ source "updatecli-action" }}'

  checkout-lint:
    name: "Update actions/checkout in lint workflow"
    kind: file
    sourceid: checkout
    scmid: default
    spec:
      file: .github/workflows/lint.yaml
      matchpattern: 'uses: actions/checkout@(.*)'
      replacepattern: 'uses: actions/checkout@{{ source "checkout" }}'

  action-yamllint:
    name: "Update action-yamllint in lint workflow"
    kind: file
    sourceid: action-yamllint
    scmid: default
    spec:
      file: .github/workflows/lint.yaml
      matchpattern: 'uses: ibiqlik/action-yamllint@(.*)'
      replacepattern: 'uses: ibiqlik/action-yamllint@{{ source "action-yamllint" }}'

  action-actionlint:
    name: "Update raven-actions/actionlint in lint workflow"
    kind: file
    sourceid: action-actionlint
    scmid: default
    spec:
      file: .github/workflows/lint.yaml
      matchpattern: 'uses: raven-actions/actionlint@(.*)'
      replacepattern: 'uses: raven-actions/actionlint@{{ source "action-actionlint" }}'

  action-shellcheck:
    name: "Update action-shellcheck in lint workflow"
    kind: file
    sourceid: action-shellcheck
    scmid: default
    spec:
      file: .github/workflows/lint.yaml
      matchpattern: 'uses: ludeeus/action-shellcheck@(.*)'
      replacepattern: 'uses: ludeeus/action-shellcheck@{{ source "action-shellcheck" }}'

actions:
  default:
    kind: github/pullrequest
    scmid: default
    spec:
      title: 'chore(deps): bump GitHub Actions versions'
      labels:
        - dependencies
        - automation
